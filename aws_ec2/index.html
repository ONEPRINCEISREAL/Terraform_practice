<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraform Deployment Status</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Infrastructure as Code</h1>
        </header>
        <main>
            <div class="status-card">
                <h2>✅ Deployment Successful</h2>
                <p>This web server was successfully provisioned and configured using Terraform.</p>
            </div>
            
            <div class="details">
                <h3>Environment Details</h3>
                <ul>
                    <li><span class="label">Environment:</span> <span class="value">Development</span></li>
                    <li><span class="label">Provisioner:</span> <span class="value">Terraform</span></li>
                    <li><span class="label">Status:</span> <span class="value">Online</span></li>
                </ul>
            </div>
        </main>
    </div>
</body>
</html>
